<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Roberto's — Canapé selection</title>
<style>
  body{margin:0;background:#F3EBDF;font-family:Georgia,'Times New Roman',serif;color:#3A2A1E}
  .wrap{max-width:520px;margin:0 auto;padding:18px 14px 40px}
  .card{background:#FBF7F1;border:1px solid #E3D5C2;border-radius:16px;overflow:hidden}
  .brand{font-size:20px;letter-spacing:6px;color:#400207;text-align:center;padding:26px 20px 4px}
  .sub{font-size:14px;color:#8A6A4F;text-align:center}
  .sub2{font-size:12px;color:#A5876B;text-align:center;margin-top:3px;font-family:Arial,sans-serif}
  .sect{border-top:1px solid #E3D5C2;margin:16px 22px 0;padding-top:13px}
  .sect-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .sect-h b{font-size:15px;color:#400207;font-weight:normal}
  .cnt{font-size:11px;color:#A5876B;font-family:Arial,sans-serif}
  .dish{display:flex;gap:11px;align-items:flex-start;padding:8px 0;cursor:pointer}
  .box{width:17px;height:17px;border-radius:4px;border:1px solid #C9AD96;background:#FBF7F1;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .dish.on .box{background:#400207;border-color:#400207}
  .box svg{width:11px;height:11px;stroke:#E8D9C7;stroke-width:3;fill:none;opacity:0}
  .dish.on .box svg{opacity:1}
  .nm{font-size:13.5px}.nm .cd{font-size:10.5px;color:#A5876B}
  .ds{font-size:12px;color:#8A6A4F}
  .note{margin:18px 22px 0}
  .note textarea{width:100%;box-sizing:border-box;border:1px solid #C9AD96;border-radius:8px;background:#fff;padding:9px 10px;font-family:Arial,sans-serif;font-size:13px;min-height:64px;resize:vertical}
  .fld{width:100%;box-sizing:border-box;border:1px solid #C9AD96;border-radius:8px;background:#fff;padding:9px 10px;font-family:Arial,sans-serif;font-size:13px;margin-bottom:8px}
  .btnrow{padding:20px 22px 26px}
  .btn{width:100%;background:#400207;color:#E8D9C7;border:none;border-radius:9px;padding:14px;font-size:14px;font-family:Georgia,serif;letter-spacing:1px;cursor:pointer}
  .btn:disabled{opacity:.55}
  .ft{text-align:center;font-size:10.5px;color:#A5876B;margin-top:12px;line-height:1.7;font-family:Arial,sans-serif}
  .msg{text-align:center;padding:60px 24px;font-size:14px;color:#6B4A33}
  .gbox{margin:16px 22px 0;background:#F3E9DA;border-radius:10px;padding:12px 14px}
  .pr{font-size:11px;color:#400207;font-family:Arial,sans-serif;text-align:right;flex-shrink:0;margin-left:8px;line-height:1.3}
  .qbox{flex-shrink:0;margin-left:8px;text-align:center}
  .qin{width:58px;border:1px solid #C9AD96;border-radius:7px;background:#fff;padding:6px 4px;font-family:Arial,sans-serif;font-size:13px;text-align:center}
  body.nogc .sect{opacity:.35;pointer-events:none}
</style>
</head>
<body>
<div class="wrap"><div class="card" id="card">
  <div class="msg">Loading your menu…</div>
</div></div>
<script>
var FN_BASE = 'https://paoaivwtkzujmrgrfjuq.supabase.co/functions/v1/event-client-menu';
var token = new URLSearchParams(location.search).get('t') || '';
var picked = {};
var guestCount = 0;
var dishById = {};
var qty = {};
function defaultQty(d){ return Math.max(guestCount||0, Number(d.min_order)||10); }
function allowedDishes(g){ return g>=30 ? 15 : (g>=20 ? 8 : (g>=15 ? 5 : 0)); }
function pickedCount(){ return Object.keys(picked).filter(function(k){ return picked[k]; }).length; }

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function el(id){ return document.getElementById(id); }

function fail(msg){
  el('card').innerHTML = '<div class="brand">R O B E R T O ’ S</div><div class="msg">'+esc(msg)+'</div>';
}

async function load(){
  try{
    var r = await fetch(FN_BASE + (token ? '?t=' + encodeURIComponent(token) : ''));
    var data = await r.json();
    if(!r.ok || data.error) return fail(data.error || 'This link is no longer available.');
    render(data);
  }catch(e){ fail('Could not load the menu — please check your connection and reopen the link.'); }
}

function render(data){
  var ev = data.event || {};
  (data.dishes||[]).forEach(function(d){ dishById[d.id] = d; });
  (data.preselected||[]).forEach(function(id){ picked[id] = true; });
  if(data.selection && data.selection.dish_ids) (data.selection.dish_ids).forEach(function(id){ picked[id] = true; });
  var groups = [['Cold','Cold canapés'],['Hot','Hot canapés'],['Dessert','Dolci']];
  var dt = ev.event_date ? new Date(ev.event_date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}) : '';
  var open = data.mode==='open';
  var h = '<div class="brand">R O B E R T O ’ S</div>'+
    '<div class="sub">'+(open?'Our canapé selection — pick your favourites':'Canapé selection for your event')+'</div>'+
    (open ? '<div class="sub2">Tick what you like and send it to us — Valentina will take care of the rest.</div>'
          : '<div class="sub2">'+esc([ev.client_name||ev.company, dt, ev.area].filter(Boolean).join(' · '))+(ev.guests?' · '+ev.guests+' guests':'')+'</div>');
  if(!open && ev.guests) guestCount = Number(ev.guests)||0;
  h += '<div class="gbox"><div style="font-size:12px;color:#8A6A4F;margin-bottom:5px">How many guests will you be? <span style="color:#A5876B">(canapé events start from 15)</span></div>'+
    '<input class="fld" id="cl-gcount" type="number" min="15" placeholder="Number of guests" value="'+(guestCount||'')+'" oninput="onGuests(this.value)" style="margin-bottom:4px">'+
    '<div id="cl-allow" style="font-size:12.5px;color:#400207;font-family:Arial,sans-serif;min-height:17px"></div>'+
    '<div id="cl-total" style="font-size:12.5px;color:#400207;font-family:Arial,sans-serif;margin-top:4px"></div></div>';
  groups.forEach(function(g){
    var list = (data.dishes||[]).filter(function(d){ return d.serve===g[0]; });
    if(!list.length) return;
    h += '<div class="sect"><div class="sect-h"><b>'+g[1]+'</b><span class="cnt" id="cnt-'+g[0]+'"></span></div>'+
      list.map(function(d){
        return '<div class="dish'+(picked[d.id]?' on':'')+'" data-id="'+d.id+'" data-g="'+g[0]+'" onclick="toggle(this)">'+
          '<span class="box"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 7"/></svg></span>'+
          '<span style="flex:1"><span class="nm">'+esc(d.name)+((d.allergens||[]).length?' <span class="cd">('+(d.allergens||[]).join(')(')+')</span>':'')+'</span>'+
          (d.description?'<br><span class="ds">'+esc(d.description)+'</span>':'')+'</span>'+
          (d.sell_price!=null?'<span class="pr">AED '+Math.round(Number(d.sell_price))+' <span style="font-size:9px">/pc</span><br><span style="font-size:9px;color:#A5876B">min '+(d.min_order||10)+' pcs</span></span>':'')+
          (picked[d.id]?'<span class="qbox" onclick="event.stopPropagation()"><input type="number" class="qin" id="q-'+d.id+'" min="'+(d.min_order||10)+'" value="'+(qty[d.id]||defaultQty(d))+'" oninput="setQty(\''+d.id+'\',this.value)"><br><span style="font-size:9px;color:#A5876B">pieces</span></span>':'')+'</div>';
      }).join('')+'</div>';
  });
  if(open){
    h += '<div class="note"><div style="font-size:12px;color:#8A6A4F;margin-bottom:5px">So we can come back to you</div>'+
      '<input class="fld" id="cl-name" placeholder="Your name" maxlength="120">'+
      '<div style="display:flex;gap:8px"><input class="fld" id="cl-phone" placeholder="Phone" maxlength="40" style="flex:1">'+
      '<input class="fld" id="cl-email" placeholder="Email" maxlength="120" style="flex:1.4"></div>'+
      '<div style="font-size:12px;color:#8A6A4F;margin:2px 0 5px">When is your event?</div>'+
      '<div style="display:flex;gap:8px"><input class="fld" id="cl-date" type="date" style="flex:1.2">'+
      '<input class="fld" id="cl-time" type="time" title="Preferred start time" style="flex:1"></div>'+
      '<div style="font-size:10.5px;color:#A5876B;margin-top:-2px">Canap\u00e9 receptions run up to 3 hours from your start time.</div></div>';
  }
  h += '<div class="note"><div style="font-size:12px;color:#8A6A4F;margin-bottom:5px">Anything we should know? Allergies, favourites, the occasion…</div>'+
       '<textarea id="cl-note" maxlength="900">'+esc(data.selection&&data.selection.note||'')+'</textarea></div>';
  h += '<div class="btnrow"><button class="btn" id="cl-send" onclick="send()">Send selection to Roberto’s</button>'+
       '<div class="ft">Valentina will come back to you to confirm availability and final details.<br>'+
       'D dairy · E egg · H homemade · N nuts · R raw · S shellfish · V vegetarian</div></div>';
  el('card').innerHTML = h;
  document.body.classList.toggle('nogc', guestCount < 15);
  onGuests(String(guestCount||''));
}

function toggle(node){
  var id = node.getAttribute('data-id');
  if(!picked[id]){
    if(guestCount < 15){ alert('First tell us how many guests you will be (minimum 15).'); return; }
    var cap = allowedDishes(guestCount);
    if(pickedCount() >= cap){ alert('With '+guestCount+' guests you can pick up to '+cap+' different canapés — untick one first, or increase the guest number.'); return; }
  }
  picked[id] = !picked[id];
  node.classList.toggle('on', picked[id]);
  var d = dishById[id];
  if(picked[id]){ if(!qty[id]) qty[id] = defaultQty(d); }
  else delete qty[id];
  var qb = node.querySelector('.qbox');
  if(qb) qb.remove();
  if(picked[id] && d){
    node.insertAdjacentHTML('beforeend',
      '<span class="qbox" onclick="event.stopPropagation()"><input type="number" class="qin" id="q-'+id+'" min="'+(d.min_order||10)+'" value="'+qty[id]+'" oninput="setQty(\''+id+'\',this.value)"><br><span style="font-size:9px;color:#A5876B">pieces</span></span>');
  }
  counts();
}
function setQty(id, v){
  var d = dishById[id];
  var n = parseInt(v,10)||0;
  qty[id] = n;
  var inp = el('q-'+id);
  var low = n < (Number(d.min_order)||10);
  if(inp) inp.style.borderColor = low ? '#B00020' : '#C9AD96';
  counts();
}
function onGuests(v){
  guestCount = parseInt(v,10)||0;
  var al = el('cl-allow');
  var cap = allowedDishes(guestCount);
  if(al){
    if(!guestCount) al.textContent = '';
    else if(guestCount < 15) al.textContent = 'Canapé events start from 15 guests.';
    else al.textContent = 'Lovely — with '+guestCount+' guests you can pick up to '+cap+' different canapés.';
  }
  document.body.classList.toggle('nogc', guestCount < 15);
  var over = pickedCount() - cap;
  if(over > 0){
    Object.keys(picked).forEach(function(k){
      if(over > 0 && picked[k]){ picked[k] = false; over--; }
    });
    document.querySelectorAll('.dish.on').forEach(function(n){
      if(!picked[n.getAttribute('data-id')]) n.classList.remove('on');
    });
  }
  counts();
}
function counts(){
  ['Cold','Hot','Dessert'].forEach(function(g){
    var c = el('cnt-'+g); if(!c) return;
    var n = document.querySelectorAll('.dish.on[data-g="'+g+'"]').length;
    c.textContent = n ? n+' selected' : 'tap to choose';
  });
  var al = el('cl-allow');
  if(al && guestCount >= 15){
    var cap = allowedDishes(guestCount);
    al.textContent = pickedCount()+' of '+cap+' canapés picked — '+guestCount+' guests.';
  }
  var tl = el('cl-total');
  if(tl){
    var total = 0, any = false, lowMin = [];
    Object.keys(picked).forEach(function(k){
      if(!picked[k] || !dishById[k]) return;
      var d = dishById[k];
      var q = qty[k] || defaultQty(d);
      total += (Number(d.sell_price)||0) * q;
      if(q < (Number(d.min_order)||10)) lowMin.push(d.name);
      any = true;
    });
    if(any && guestCount >= 15){
      tl.innerHTML = '<b>Estimated total: AED '+Math.round(total).toLocaleString('en-US')+'</b> · about AED '+Math.round(total/guestCount).toLocaleString('en-US')+' per guest'+
        (lowMin.length?'<br><span style="font-size:10.5px;color:#B00020">Please check quantities — below the minimum for: '+esc(lowMin.join(', '))+'</span>':'')+
        '<br><span style="font-size:10.5px;color:#A5876B">Adjust the pieces of each canapé as you like — Valentina will confirm your final quote.</span>';
    } else tl.innerHTML = '';
  }
}
async function send(){
  var ids = Object.keys(picked).filter(function(k){ return picked[k]; });
  if(!ids.length){ alert('Pick at least one canapé first.'); return; }
  if(guestCount < 15){ alert('First tell us how many guests you will be (minimum 15).'); return; }
  var cap = allowedDishes(guestCount);
  if(ids.length > cap){ alert('With '+guestCount+' guests you can pick up to '+cap+' different canapés.'); return; }
  var lowMin = ids.filter(function(k){ var d=dishById[k]; return (qty[k]||defaultQty(d)) < (Number(d.min_order)||10); });
  if(lowMin.length){ alert('Some quantities are below the minimum: '+lowMin.map(function(k){ return dishById[k].name+' (min '+(dishById[k].min_order||10)+')'; }).join(', ')); return; }
  var quantities = {};
  ids.forEach(function(k){ quantities[k] = qty[k] || defaultQty(dishById[k]); });
  var payload = { dish_ids:ids, quantities:quantities, note:(el('cl-note')||{}).value||'', guests:guestCount };
  if(token){ payload.t = token; }
  else {
    payload.name = (el('cl-name')||{}).value||'';
    payload.phone = (el('cl-phone')||{}).value||'';
    payload.email = (el('cl-email')||{}).value||'';
    payload.event_date = (el('cl-date')||{}).value||'';
    payload.time_from = (el('cl-time')||{}).value||'';
    if(!payload.name.trim()){ alert('Please tell us your name.'); return; }
    if(!payload.phone.trim() && !payload.email.trim()){ alert('Please leave a phone number or email so we can reach you.'); return; }
    if(!payload.event_date){ alert('Please tell us the date of your event.'); return; }
    var todayISO = new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')+'-'+String(new Date().getDate()).padStart(2,'0');
    if(payload.event_date < todayISO){ alert('Please pick a date in the future.'); return; }
  }
  var btn = el('cl-send'); btn.disabled = true; btn.textContent = 'Sending…';
  try{
    var r = await fetch(FN_BASE, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload) });
    var data = await r.json();
    if(!r.ok || data.error) throw new Error(data.error||'failed');
    el('card').innerHTML = '<div class="brand">R O B E R T O ’ S</div>'+
      '<div class="msg">Grazie! Your selection has been sent.<br><br>Valentina will be in touch shortly to confirm everything for your evening.</div>';
  }catch(e){
    btn.disabled = false; btn.textContent = 'Send selection to Roberto’s';
    alert('Could not send — please try again. '+(e.message||''));
  }
}
load();
</script>
</body>
</html>
